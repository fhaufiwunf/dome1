name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: devsecops-demo-app
  APP_URL: http://127.0.0.1:8081
  N8N_WEBHOOK_URL: https://unfitted-unsubtle-overdrive.ngrok-free.dev/webhook/security-scan

jobs:
  security-scan:
    runs-on: [self-hosted, linux, zap]
  build-scan-gate-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep Scan
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --json \
            --output semgrep-report.json \
            . || true

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH,MEDIUM,LOW
          ignore-unfixed: true
          format: json
          output: trivy-report.json
          exit-code: '0'

      # Optional: start the app before ZAP. Adjust this section to your app.
      # If your repository does not have docker-compose.yml, replace this with your own start command.
      - name: Validate ZAP target
        run: |
          set -euo pipefail

          if [ -z "${SCAN_TARGET_URL:-}" ]; then
            echo "SCAN_TARGET_URL is not configured."
            exit 1
          fi

         echo "Checking target: $SCAN_TARGET_URL"

         for attempt in {1..20}; do
            if curl -fsS --max-time 10 "$SCAN_TARGET_URL" >/dev/null; then
              echo "Target is reachable."
              curl -I --max-time 10 "$SCAN_TARGET_URL" || true
              exit 0
            fi

            echo "Attempt $attempt/20 failed."
            sleep 3
          done

          echo "Target is not reachable from the runner."
          exit 1

      - name: Run ZAP Baseline Scan
        run: |
          set -euo pipefail

          rm -rf zap-output
          mkdir -p zap-output
          chmod 777 zap-output

          START_TIME=$(date +%s)

          set +e
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}/zap-output:/zap/wrk:rw" \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t "$SCAN_TARGET_URL" \
              -m 1 \
              -J zap-report.json \
              -r zap-report.html \
              -I \
              -d \
              2>&1 | tee zap-output/zap-scan.log

          ZAP_EXIT=${PIPESTATUS[0]}
          set -e

          END_TIME=$(date +%s)
          ZAP_DURATION=$((END_TIME - START_TIME))

          echo "ZAP exit code: $ZAP_EXIT"
          echo "ZAP duration: ${ZAP_DURATION}s"

          test -s zap-output/zap-report.json || {
            echo "ZAP report was not generated."
            exit 1
          }

          cp zap-output/zap-report.json zap-report.json
          cp zap-output/zap-report.html zap-report.html
          cp zap-output/zap-scan.log zap-scan.log

          jq empty zap-report.json
          
      - name: Send Reports to n8n Security Gate
        id: security_gate
        run: |
          set -euo pipefail

          jq -n \
            --slurpfile trivy trivy-report.json \
            --slurpfile semgrep semgrep-report.json \
            --slurpfile zap zap-report.json \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "${{ github.sha }}" \
            '{
              metadata: {
                repo: $repo,
                branch: $branch,
                commit: $commit
              },
              trivy: $trivy[0],
              semgrep: $semgrep[0],
              zap: $zap[0]
            }' > final-report.json

          curl -fsS --retry 3 --connect-timeout 10 --max-time 180 \
            -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @final-report.json \
            -o n8n-response.json

          cat n8n-response.json

          if ! jq -e . n8n-response.json > /dev/null; then
            echo "n8n did not return valid JSON. Blocking deployment."
            exit 1
          fi

          decision=$(jq -r '.pipeline_decision // "BLOCK"' n8n-response.json | tr '[:upper:]' '[:lower:]')
          risk_score=$(jq -r '.risk_score // 0' n8n-response.json)

          echo "decision=$decision" >> "$GITHUB_OUTPUT"
          echo "risk_score=$risk_score" >> "$GITHUB_OUTPUT"

      - name: Check Security Gate
        run: |
          echo "Security decision: ${{ steps.security_gate.outputs.decision }}"
          echo "Risk score: ${{ steps.security_gate.outputs.risk_score }}"

          if [ "${{ steps.security_gate.outputs.decision }}" != "allow" ]; then
            echo "Security gate failed. CD deployment stopped."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl -n ${{ secrets.K8S_NAMESPACE }} set image deployment/${{ secrets.K8S_DEPLOYMENT }} \
            ${{ secrets.K8S_CONTAINER }}=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          kubectl -n ${{ secrets.K8S_NAMESPACE }} rollout status deployment/${{ secrets.K8S_DEPLOYMENT }}
